version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    
    # 1. Block Major Updates
    ignore:
      # Ignore all major version bumps to avoid breaking changes
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

    # 2. Group Minor/Patch Updates
    # This combines all @astrojs updates into one PR so you don't get 5 separate alerts
    groups:
      astro-ecosystem:
        patterns:
          - "astro"
          - "@astrojs/*"